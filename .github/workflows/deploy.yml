name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from GitHub UI

# Only one deploy at a time; cancel older runs on the same branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    # Only deploy from the main branch (not PRs)
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Trigger Render deploy hook
        # Set RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets → Actions
        # If the secret is not yet set, this step is skipped gracefully.
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL secret is not set — skipping auto-deploy."
            echo "Add it in GitHub → Settings → Secrets → Actions once you deploy to Render."
            exit 0
          fi
          curl -s -X POST "$HOOK_URL" \
            -H "Content-Type: application/json" \
            --fail \
            --retry 3 \
            --retry-delay 5

      - name: Deploy triggered
        run: echo "Render deploy hook triggered. Monitor at https://dashboard.render.com"
