name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Backend: unit tests (safety layer + chunking)
  # These modules use only stdlib — no heavy ML deps needed.
  # -------------------------------------------------------
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # Safety and chunking modules use only stdlib (re, logging, dataclasses).
      # Install pytest only — no torch/chromadb/sentence-transformers needed.
      - name: Install test runner
        run: pip install pytest==7.4.4 pytest-cov>=4.1.0

      - name: Run safety + chunking unit tests
        run: pytest tests/test_safety.py tests/test_chunk_text.py -v --tb=short

      # Integration tests need the full ML stack and live API keys.
      # Run best-effort so missing keys / rate limits don't block PRs.
      - name: Install full dependencies for integration tests
        run: |
          pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir httpx>=0.27.0
        continue-on-error: true

      - name: Run retrieval + API integration tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: pytest tests/test_retrieval.py tests/test_api.py -v --tb=short
        continue-on-error: true

  # -------------------------------------------------------
  # Frontend: install + lint + build
  # -------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1
