name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -------------------------------------------------------
  # Backend: lint + test
  # -------------------------------------------------------
  backend:
    name: Backend (Python 3.11)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch
        run: pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements-dev.txt

      - name: Run safety + chunking unit tests
        run: pytest tests/test_safety.py tests/test_chunk_text.py -v --tb=short

      # Retrieval and API tests need the Chroma DB (committed to git) and API keys.
      # continue-on-error so rate limits don't block the PR.
      - name: Run retrieval + API tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: pytest tests/test_retrieval.py tests/test_api.py -v --tb=short
        continue-on-error: true

  # -------------------------------------------------------
  # Frontend: install + lint + build
  # -------------------------------------------------------
  frontend:
    name: Frontend (Node 20)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 1
