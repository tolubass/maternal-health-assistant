name: RAGAS Evaluation

on:
  # Run weekly on Sunday at 02:00 UTC to monitor model quality drift
  schedule:
    - cron: "0 2 * * 0"
  # Allow manual runs from GitHub UI
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Number of Q&A pairs to evaluate (default: 5)"
        required: false
        default: "5"

jobs:
  evaluate:
    name: Run RAGAS metrics
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install CPU-only PyTorch
        run: pip install --no-cache-dir torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install evaluation dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir \
            ragas>=0.1.0 \
            datasets>=2.14.0 \
            langchain-google-genai>=1.0.0 \
            langchain-community>=0.0.1

      - name: Run RAGAS evaluation
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SAMPLE_SIZE: ${{ github.event.inputs.sample_size || '5' }}
        run: python evaluation/run_ragas.py

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ragas-report-${{ github.run_id }}
          path: evaluation/reports/
          retention-days: 30
