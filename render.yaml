services:
  - type: web
    name: maternal-health-assistant
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Set this in the Render dashboard
      - key: GROQ_API_KEY
        sync: false          # Set this in the Render dashboard
      - key: CORS_ORIGINS
        value: "*"           # Tighten to your Render URL after first deploy
